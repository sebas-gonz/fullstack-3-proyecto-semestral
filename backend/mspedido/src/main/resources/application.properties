
# PUERTO
server.port=${PORT:8083}

spring.application.name=${APP_NAME:ms-pedido}
api.google.distance.matrix.key = ${GEOCODING_KEY}

# DATABASE
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ms_pedido}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# plantilla para flyway
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.apache.kafka.common.serialization.StringDeserializer

ms-inventario.url=http://MS-INVENTARIO

spring.threads.virtual.enabled=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
#circuitbraker
resilience4j.circuitbreaker.instances.inventarioCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.inventarioCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.inventarioCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.inventarioCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.inventarioCB.slowCallDurationThreshold=2s
resilience4j.circuitbreaker.instances.inventarioCB.slowCallRateThreshold=100
resilience4j.circuitbreaker.instances.inventarioCB.registerHealthIndicator=true

# hikari
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000

server.tomcat.threads.max=500
server.tomcat.accept-count=200

