spring.application.name=api-gateway
server.port=8091

#ms-usuario
spring.cloud.gateway.server.webmvc.routes[0].id=ms-usuario
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://MS-USUARIO
spring.cloud.gateway.server.webmvc.routes[0].predicates[0].name=Path
spring.cloud.gateway.server.webmvc.routes[0].predicates[0].args.pattern=/api/v1/usuarios/**
#circuitbraker
spring.cloud.gateway.server.webmvc.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webmvc.routes[0].filters[0].args.id=usuarioCB
spring.cloud.gateway.server.webmvc.routes[0].filters[0].args.fallbackUri=forward:/fallback/usuarios

