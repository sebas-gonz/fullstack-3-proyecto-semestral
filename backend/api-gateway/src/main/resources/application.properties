#eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
#monitorizacion
management.info.env.enabled=true
management.endpoints.web.discovery.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
#hilos virtuales
spring.threads.virtual.enabled=true
#Circuit braker
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s
resilience4j.circuitbreaker.configs.default.slowCallRateThreshold=100
resilience4j.circuitbreaker.configs.default.slowCallDurationThreshold=5s

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-up1zt2lh8orqmjdq.us.auth0.com/
spring.security.oauth2.resourceserver.jwt.audiences=https://erp-api.com

resilience4j.timelimiter.configs.default.timeoutDuration=4s

eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1