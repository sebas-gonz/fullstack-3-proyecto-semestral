
# PUERTO
server.port=${PORT:8082}

spring.application.name=${APP_NAME:ms-inventario}

# DATABASE
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ms_inventario}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# plantilla para flyway
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=ms-inventario-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.seb.msinventario.infrastructure.adapter.in.kafka.dto.pedido.PedidoCreadoEventDto
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.threads.virtual.enabled=true

logging.level.org.hibernate.orm.jdbc.bind=TRACE

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/


