spring.application.name=${APP_NAME:ms-usuario}
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ms-db}
spring.datasource.username=${USER_NAME:postgres}
spring.datasource.password=${PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#Key api google
api.google.geocoding.key=${GEOCODING_KEY}

spring.flyway.enabled=false

spring.threads.virtual.enabled=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/